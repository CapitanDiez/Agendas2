$def with(contacto)
<form method="POST">
    <label for="id_contacto">ID Contacto:</label>
    <input type="text" id="id_contacto" value="$contacto['id_contacto']" readonly><br><br>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" value="$contacto['nombre']"><br><br>

    <label for="primer_apellido">Primer Apellido:</label>
    <input type="text" id="primer_apellido" name="primer_apellido" value="$contacto['primer_apellido']"><br><br>

    <label for="segundo_apellido">Segundo Apellido:</label>
    <input type="text" id="segundo_apellido" name="segundo_apellido" value="$contacto['segundo_apellido']"><br><br>

    <label for="email">Email:</label>
    <input type="text" id="email" name="email" value="$contacto['email']"><br><br>

    <label for="telefono">Teléfono:</label>
    <input type="text" id="telefono" name="telefono" value="$contacto['telefono']"><br><br>

    <a href="/lista_contactos">Cancelar</a>
    <button type="submit">Guardar</button>
</form>
